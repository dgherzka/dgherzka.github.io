<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>dgherzka</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            /* Deep charcoal for a softer dark mode */
            background: #121212;
            /* Muted white/grey for reduced eye strain */
            color: #d1d1d1;
            font-family: "Iowan Old Style", "Apple Garamond", "Baskerville", "Times New Roman", "Droid Serif", Times, "Source Serif Pro", serif;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-left: 15vw;
        }

        a {
            color: #d1d1d1;
            text-decoration: none;
            font-size: 1.15rem;
            line-height: 1.5;
            transition: opacity 0.2s ease;
        }

        a:hover {
            text-decoration: underline;
            text-underline-offset: 5px;
            text-decoration-thickness: 1px;
            color: #ffffff;
        }

        nav::before {
            content: "";
            width: 40px;
            height: 1px;
            background: #d1d1d1;
            margin-bottom: 24px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <nav>
        <a href="timer">Timer</a>
        <a href="wortschatzkartenschmiede">Wortschatzkartenschmiede</a>
    </nav>

</body>
</html>
