<!DOCTYPE html>
<html>
<head>
    <title>Timer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style type="text/css">
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: "Iowan Old Style", "Apple Garamond", "Baskerville", "Times New Roman", "Droid Serif", Times, "Source Serif Pro", serif;
            color: #ffffff;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        /* States - Balanced middle-ground colors: distinct but muted */
        body.state_stopped { background-color: #121212; color: #d1d1d1; }
        body.state_waiting { 
            background-color: #705a10; 
            color: #ffffff;
            animation: waiting-fade var(--ready-threshold) linear;
        }
        body.state_ready { 
            background-color: #1b4f21; 
            color: #ffffff;
            animation: ready-flash 800ms infinite;
        }
        body.state_timing { background-color: #143d59; color: #ffffff; }

        @keyframes waiting-fade {
            from { background-color: #705a10; }
            to { background-color: #1b4f21; }
        }
        @keyframes ready-flash {
            from, 40% { background-color: #1b4f21; }
            20% { background-color: #2b6b30; }
        }

        main {
            padding-left: 15vw;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* Typographic Bar */
        main::before {
            content: "";
            width: 40px;
            height: 1px;
            background: currentColor;
            margin-bottom: 24px;
            opacity: 0.5;
        }

        /* Hide bar instantly during timing */
        body.state_timing main::before {
            display: none;
        }

        #nux {
            font-size: 1.15rem;
            line-height: 1.5;
        }

        #durations {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .duration {
            line-height: 1.2;
        }

        @media (max-width: 600px) {
            main { padding-left: 10vw; }
        }

        #diag { display: none; }
    </style>
    <script type="text/javascript">
        var STATES = {
            STOPPED : {name: 'STOPPED', class: 'state_stopped'},
            WAITING : {name: 'WAITING', class: 'state_waiting'},
            READY : {name: 'READY', class: 'state_ready'},
            TIMING : {name: 'TIMING', class: 'state_timing'},
        };
        var READY_THRESHOLD_MS = 1000;
        document.documentElement.style.setProperty('--ready-threshold', `${READY_THRESHOLD_MS}ms`);

        var DISPLAY_DURATIONS = 4;
        var durationHistory = [];
        var waitingTimerHandle, currentState, startTime, stopTime, keyIsDown;

        function setState(state) {
            if (state == currentState) return;

            var finishedTiming = (state == STATES.STOPPED && currentState == STATES.TIMING);
            var nuxElement = document.getElementById('nux');
            var durationsElement = document.getElementById('durations');

            if (waitingTimerHandle) {
                clearTimeout(waitingTimerHandle);
                waitingTimerHandle = null;
            }

            let nuxText = '';
            switch (state) {
                case STATES.STOPPED: nuxText = 'Click or Space'; break;
                case STATES.WAITING: 
                    waitingTimerHandle = setTimeout(() => setState(STATES.READY), READY_THRESHOLD_MS);
                    nuxText = 'Hold...'; 
                    break;
                case STATES.READY: nuxText = 'Release!'; break;
                case STATES.TIMING: nuxText = ''; break;
            }
            nuxElement.innerText = nuxText;

            if (currentState) document.body.classList.remove(currentState.class);
            document.body.classList.add(state.class);
            currentState = state;

            if (finishedTiming) {
                var durationSeconds = (stopTime - startTime) / 1000;
                durationHistory.push(durationSeconds);
                updateHistoryUI();
            }

            var firstRun = durationHistory.length === 0;
            durationsElement.style.display = (state == STATES.STOPPED && !firstRun) ? 'flex' : 'none';
            nuxElement.style.display = (state != STATES.STOPPED || firstRun) ? 'block' : 'none';
        }

        function updateHistoryUI() {
            const container = document.getElementById('durations');
            container.innerHTML = '';
            for (var i = 0; i < Math.min(durationHistory.length, DISPLAY_DURATIONS); i++) {
                var d = durationHistory[durationHistory.length - 1 - i];
                var el = document.createElement('div');
                el.classList.add('duration');
                el.innerText = d.toFixed(3);
                
                var size = 1.15 + (i === 0 ? 0.2 : - (i * 0.1));
                el.style.fontSize = `${size}rem`;
                el.style.opacity = 1 - (i * 0.2);
                
                container.appendChild(el);
            }
        }

        var DEBOUNCE_TIME_MS = 100;
        var lastDownTime = 0;

        function down(e) {
            if (e.type === 'touchstart') e.preventDefault();
            var now = Date.now();
            if (now - lastDownTime < DEBOUNCE_TIME_MS) return;
            lastDownTime = now;

            if (currentState == STATES.STOPPED) setState(STATES.WAITING);
            else if (currentState == STATES.TIMING) {
                stopTime = now;
                setState(STATES.STOPPED);
            }
        }

        function up() {
            if (currentState == STATES.READY) {
                startTime = Date.now();
                setState(STATES.TIMING);
            } else if (currentState == STATES.WAITING) {
                setState(STATES.STOPPED);
            }
        }

        window.onload = () => {
            const events = [['mousedown', down], ['mouseup', up], ['touchstart', down], ['touchend', up]];
            events.forEach(ev => document.addEventListener(ev[0], ev[1], {passive: false}));
            
            document.addEventListener('keydown', e => {
                if (e.key === ' ' && !keyIsDown) { down(e); keyIsDown = true; }
            });
            document.addEventListener('keyup', e => {
                if (e.key === ' ') { up(); keyIsDown = false; }
                if (e.key === 'Escape') setState(STATES.STOPPED);
            });

            setState(STATES.STOPPED);
        };
    </script>
</head>
<body>
    <div id="diag"></div>
    <main>
        <div id="nux">Timer</div>
        <div id="durations"></div>
    </main>
</body>
</html>
